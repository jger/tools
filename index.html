<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Tools Collection</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --accent: #2563eb;
        --border: #dbe3ef;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        line-height: 1.5;
        background: linear-gradient(180deg, var(--bg) 0%, #ffffff 100%);
        color: var(--text);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3.5rem;
      }

      .hero {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        background: var(--card);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
      }

      .meta {
        margin: 0.5rem 0 0;
        color: var(--muted);
      }

      .version-chip {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.88rem;
        border: 1px solid var(--border);
        background: #eef4ff;
        color: #183c85;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1rem;
        margin-top: 1.25rem;
      }

      .card {
        display: block;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        text-decoration: none;
        color: inherit;
        background: var(--card);
        transition: transform 0.12s ease, border-color 0.12s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }

      .card h2 {
        margin: 0 0 0.4rem;
        font-size: 1.1rem;
      }

      .card p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>Open Tools</h1>
        <p>
          A small public collection of browser tools. Choose a project and use it
          instantly.
        </p>
        <p class="meta">More tools will be added over time.</p>
        <p class="version-chip">Version: <strong>__TOOLS_VERSION__</strong></p>
      </section>

      <div class="grid">
        <a class="card" href="./open/az/">
          <h2>AZ Tool</h2>
          <p>With Arbeitszeugnis you can easily create work experience documents.</p>
        </a>
      </div>

      <p class="meta">
        Open source and available to everyone.
      </p>
    </main>
  </body>
</html>
