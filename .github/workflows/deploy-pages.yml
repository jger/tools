name: Deploy GitHub Pages

# Note: release:published does not run when the release is created by another
# workflow using GITHUB_TOKEN (semantic-release). Deploy on push to main instead.
on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Inject release version into index
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$VERSION" = "dev" ]; then
            VERSION="manual"
          fi
          sed -i.bak "s/__TOOLS_VERSION__/$VERSION/g" index.html
          rm -f index.html.bak

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
